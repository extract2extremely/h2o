name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Validate HTML
        run: |
          # Basic HTML validation
          echo "✅ HTML validation would go here"
          echo "Checking for common issues..."
          grep -r "http://" . --include="*.html" --include="*.js" | grep -v "localhost" | grep -v "github" || echo "✅ No hardcoded HTTP URLs found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          configPath: './lighthouserc.json'
        continue-on-error: true  # Don't fail if lighthouse check fails

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for secrets
        run: |
          echo "🔒 Checking for exposed secrets..."
          if grep -r "password\|api.key\|secret" . --include="*.js" --include="*.html" | grep -v "node_modules" | grep -v "lib/"; then
            echo "⚠️  Warning: Found potential hardcoded secrets"
          else
            echo "✅ No obvious secrets found"
          fi
      
      - name: Verify HTTPS in manifest
        run: |
          echo "🔐 Checking security settings..."
          if grep -q "https" manifest.json || grep -q "start_url" manifest.json; then
            echo "✅ Manifest.json configured correctly"
          fi

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check file structure
        run: |
          echo "📁 Verifying project structure..."
          test -f "index.html" && echo "✅ index.html found" || echo "❌ index.html missing"
          test -f "manifest.json" && echo "✅ manifest.json found" || echo "❌ manifest.json missing"
          test -f "service-worker.js" && echo "✅ service-worker.js found" || echo "❌ service-worker.js missing"
          test -d "js" && echo "✅ js/ directory found" || echo "❌ js/ directory missing"
          test -d "css" && echo "✅ css/ directory found" || echo "❌ css/ directory missing"
          test -d "lib" && echo "✅ lib/ directory found" || echo "❌ lib/ directory missing"
