<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCollect - System Diagnostics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 40px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #d1d5db;
        }
        
        .status-item.loaded {
            background: #f0fdf4;
            border-left-color: #10b981;
        }
        
        .status-item.pending {
            background: #fffbeb;
            border-left-color: #f59e0b;
        }
        
        .status-icon {
            font-size: 20px;
            margin-right: 12px;
            min-width: 24px;
        }
        
        .status-info {
            flex: 1;
        }
        
        .status-name {
            font-weight: 600;
            color: #1f2937;
            font-size: 14px;
        }
        
        .status-desc {
            font-size: 12px;
            color: #6b7280;
            margin-top: 3px;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #1f2937;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 13px;
            color: #1e40af;
            line-height: 1.6;
        }
        
        .success-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 13px;
            color: #166534;
            line-height: 1.6;
        }
        
        .warning-box {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 13px;
            color: #92400e;
            line-height: 1.6;
        }
        
        .code {
            background: #1f2937;
            color: #f3f4f6;
            padding: 10px 12px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .footer {
            background: #f9fafb;
            padding: 20px 40px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 System Diagnostics</h1>
            <p>FinCollect Library & Browser Status Check</p>
        </div>
        
        <div class="content">
            <!-- Library Status Section -->
            <div class="section">
                <div class="section-title">📦 Library Status</div>
                <div id="library-status"></div>
            </div>
            
            <!-- Connection Status -->
            <div class="section">
                <div class="section-title">🌐 Network Status</div>
                <div class="status-item" id="connection-status">
                    <div class="status-icon">🔌</div>
                    <div class="status-info">
                        <div class="status-name" id="connection-name">Checking...</div>
                        <div class="status-desc" id="connection-desc">Testing internet connection</div>
                    </div>
                </div>
            </div>
            
            <!-- Browser Information -->
            <div class="section">
                <div class="section-title">💻 Browser Information</div>
                <div class="status-item">
                    <div class="status-icon">🌍</div>
                    <div class="status-info">
                        <div class="status-name" id="browser-name">Detecting...</div>
                        <div class="status-desc" id="browser-version">JavaScript enabled</div>
                    </div>
                </div>
            </div>
            
            <!-- Troubleshooting -->
            <div class="section">
                <div class="section-title">🛠️ Troubleshooting Guide</div>
                <div id="troubleshooting"></div>
            </div>
            
            <!-- Actions -->
            <div class="actions">
                <button class="btn btn-primary" onclick="location.href='index.html'">← Back to FinCollect</button>
                <button class="btn btn-secondary" onclick="location.reload()">🔄 Refresh Diagnostics</button>
            </div>
        </div>
        
        <div class="footer">
            <p>FinCollect v1.0 - System Diagnostics | Generated: <span id="timestamp"></span></p>
        </div>
    </div>
    
    <script>
        // Update timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
        
        // Check Network
        function checkNetwork() {
            const element = document.getElementById('connection-status');
            if (navigator.onLine) {
                element.classList.add('loaded');
                element.classList.remove('pending');
                document.getElementById('connection-name').textContent = 'Connected ✓';
                document.getElementById('connection-desc').textContent = 'Your internet connection is active';
            } else {
                element.classList.add('pending');
                element.classList.remove('loaded');
                document.getElementById('connection-name').textContent = 'Offline';
                document.getElementById('connection-desc').textContent = 'No internet connection available';
            }
        }
        
        // Detect Browser
        function detectBrowser() {
            const ua = navigator.userAgent;
            let browserName = 'Unknown';
            let browserVersion = 'Unknown';
            
            if (ua.indexOf('Chrome') > -1 && ua.indexOf('Chromium') === -1) {
                browserName = 'Google Chrome';
                browserVersion = ua.match(/Chrome\/([0-9]+\.[0-9]+)/)[1];
            } else if (ua.indexOf('Safari') > -1) {
                browserName = 'Safari';
                browserVersion = ua.match(/Version\/([0-9]+\.[0-9]+)/)[1];
            } else if (ua.indexOf('Firefox') > -1) {
                browserName = 'Mozilla Firefox';
                browserVersion = ua.match(/Firefox\/([0-9]+)/)[1];
            } else if (ua.indexOf('Edge') > -1) {
                browserName = 'Microsoft Edge';
                browserVersion = ua.match(/Edg\/([0-9]+\.[0-9]+)/)[1];
            }
            
            document.getElementById('browser-name').textContent = `${browserName} ${browserVersion}`;
            document.getElementById('browser-version').textContent = 'JavaScript enabled • WebGL supported';
        }
        
        // Check Libraries
        function checkLibraries() {
            const libraries = [
                { name: 'jsPDF', check: () => !!(window.jspdf && window.jspdf.jsPDF), desc: 'PDF Generation' },
                { name: 'html2canvas', check: () => typeof window.html2canvas === 'function', desc: 'HTML to Canvas' },
                { name: 'Chart.js', check: () => typeof window.Chart === 'function', desc: 'Data Visualization' },
                { name: 'SweetAlert2', check: () => !!(window.Swal && typeof window.Swal.fire === 'function'), desc: 'Beautiful Alerts' }
            ];
            
            let html = '';
            libraries.forEach(lib => {
                const loaded = lib.check();
                const icon = loaded ? '✓' : '⏳';
                const status = loaded ? 'loaded' : 'pending';
                html += `
                    <div class="status-item ${status}">
                        <div class="status-icon">${icon}</div>
                        <div class="status-info">
                            <div class="status-name">${lib.name}</div>
                            <div class="status-desc">${lib.desc} ${loaded ? '- Ready' : '- Loading...'}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('library-status').innerHTML = html;
        }
        
        // Generate Troubleshooting Guide
        function generateTroubleshooting() {
            const tips = [
                {
                    title: '❌ If PDF download fails',
                    steps: [
                        'Check your internet connection - CDN requires online access',
                        'Clear your browser cache and try again',
                        'Try using Print button as alternative (Ctrl+P)',
                        'Use Chrome or Firefox for best compatibility'
                    ]
                },
                {
                    title: '⏳ If libraries are still loading',
                    steps: [
                        'Libraries load from CDN automatically',
                        'Wait 5-10 seconds for initial load',
                        'Refresh the page if stuck (F5)',
                        'Check browser console for errors (F12)'
                    ]
                },
                {
                    title: '🌐 If you\'re offline',
                    steps: [
                        'Basic features work offline (data entry, viewing)',
                        'PDF download requires internet connection',
                        'Use Print button to save as PDF',
                        'Changes sync when back online'
                    ]
                }
            ];
            
            let html = '';
            tips.forEach(tip => {
                html += `
                    <div style="margin-bottom: 20px;">
                        <h4 style="color: #1f2937; margin-bottom: 8px;">${tip.title}</h4>
                        <ol style="margin-left: 20px; color: #6b7280; font-size: 13px; line-height: 1.6;">
                            ${tip.steps.map(step => `<li style="margin-bottom: 5px;">${step}</li>`).join('')}
                        </ol>
                    </div>
                `;
            });
            document.getElementById('troubleshooting').innerHTML = html;
        }
        
        // Initialize
        checkLibraries();
        checkNetwork();
        detectBrowser();
        generateTroubleshooting();
        
        // Re-check every 2 seconds
        setInterval(checkLibraries, 2000);
        window.addEventListener('online', checkNetwork);
        window.addEventListener('offline', checkNetwork);
    </script>
</body>
</html>
